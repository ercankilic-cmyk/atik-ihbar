<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atık İhbar</title>
<meta name="theme-color" content="#0a1410">
<meta property="og:type" content="website">
<meta property="og:title" content="Atık İhbar — fotoğraf + konumla anında ihbar">
<meta property="og:description" content="Çöp, moloz, kaçak döküm... Fotoğraf ve konumla 10 saniyede ihbar et; doğru birime gitsin, iki taraf da çözülene kadar takip etsin.">
<meta property="og:url" content="https://ercankilic-cmyk.github.io/atik-ihbar/">
<meta property="og:image" content="https://ercankilic-cmyk.github.io/atik-ihbar/kapak-ihbar.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:title" content="Atık İhbar">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1410; --panel:#0f1d17; --panel-2:#13261d; --line:#1d3a2e;
    --green:#34d399; --green-dim:#10b981; --amber:#fbbf24; --red:#f87171; --cyan:#22d3ee;
    --txt:#e6f5ee; --txt-dim:#7fa593; --ink:#06140a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--txt);min-height:100vh;padding:22px 16px 60px;
    background-image:radial-gradient(circle at 15% 0%,rgba(52,211,153,.06),transparent 42%),radial-gradient(circle at 95% 100%,rgba(34,211,238,.05),transparent 45%)}
  .wrap{max-width:920px;margin:0 auto}
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif}

  header{display:flex;align-items:center;gap:15px;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel-2),var(--panel));border-radius:16px;padding:16px 18px;margin-bottom:18px}
  .logo{width:50px;height:50px;border-radius:12px;background:radial-gradient(circle at 50% 35%,var(--green),var(--green-dim));display:grid;place-items:center;font-size:26px;box-shadow:0 0 22px rgba(52,211,153,.5);flex:none}
  header h1{font-size:22px;font-weight:800;letter-spacing:.5px;line-height:1.05}
  header .sub{font-size:11px;letter-spacing:2px;color:var(--txt-dim);text-transform:uppercase;margin-top:3px}
  .lang-sel{margin-left:auto;background:var(--ink);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 10px;font-family:'IBM Plex Mono';font-size:12px;cursor:pointer}
  .lang-sel:focus{outline:none;border-color:var(--green)}

  .roles{display:flex;gap:8px;background:var(--ink);border:1px solid var(--line);border-radius:12px;padding:5px;margin:0 auto 20px;width:max-content}
  .roles button{font-family:'IBM Plex Mono';font-size:13px;font-weight:600;letter-spacing:1px;padding:9px 18px;border:0;border-radius:8px;background:transparent;color:var(--txt-dim);cursor:pointer;transition:.15s}
  .roles button.on{background:var(--green);color:var(--ink)}

  .panel{border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:20px;margin-bottom:16px}
  .panel h2{font-size:18px;font-weight:800;margin-bottom:3px}
  .panel .ph{font-size:12px;color:var(--txt-dim);margin-bottom:16px;line-height:1.5}

  label.fl{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-dim);margin:14px 0 6px}
  input[type=text],textarea,select{width:100%;background:var(--ink);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px 13px;font-family:'IBM Plex Mono';font-size:13.5px}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--green)}
  textarea{resize:vertical;min-height:64px}

  .photo-box{border:1.5px dashed var(--line);border-radius:14px;background:var(--ink);padding:20px;text-align:center;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .photo-box:hover{border-color:var(--green-dim)}
  .photo-box .pi{font-size:34px}
  .photo-box .pt{font-size:13px;color:var(--txt-dim);margin-top:8px}
  .photo-box img{max-width:100%;max-height:230px;border-radius:10px;display:block;margin:0 auto}
  .photo-box input{position:absolute;inset:0;opacity:0;cursor:pointer}

  .geo{display:flex;gap:10px;align-items:center;margin-top:6px;flex-wrap:wrap}
  .geo .gv{font-size:12px;color:var(--cyan)}
  .btn{font-family:'IBM Plex Mono';font-weight:600;font-size:13px;letter-spacing:.5px;padding:11px 20px;border-radius:10px;border:1px solid var(--green);background:var(--green);color:var(--ink);cursor:pointer;transition:.15s;text-transform:uppercase}
  .btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--txt-dim);border-color:var(--line);text-transform:none;letter-spacing:0}
  .btn.ghost:hover{color:var(--txt);border-color:var(--txt-dim)}
  .btn.sm{padding:7px 12px;font-size:11.5px}
  .btn.full{width:100%;margin-top:20px;padding:14px}

  .ok-msg{border:1px solid var(--green);background:rgba(52,211,153,.08);color:var(--green);border-radius:12px;padding:14px;font-size:13px;line-height:1.5;margin-bottom:16px;display:none}
  .ok-msg.show{display:block;animation:rise .35s ease}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .card{border:1px solid var(--line);background:var(--panel-2);border-radius:14px;padding:14px;margin-top:12px;display:grid;grid-template-columns:90px 1fr;gap:14px}
  .card .thumb{width:90px;height:90px;border-radius:10px;background:var(--ink);object-fit:cover;display:block}
  .card .noimg{width:90px;height:90px;border-radius:10px;background:var(--ink);display:grid;place-items:center;font-size:26px;color:var(--txt-dim)}
  .ctop{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
  .cno{font-size:11px;color:var(--txt-dim);letter-spacing:1px}
  .cyer{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px}
  .cmeta{font-size:12px;color:var(--txt-dim);line-height:1.5}
  .cmeta a{color:var(--cyan);text-decoration:none}
  .cmeta a:hover{text-decoration:underline}
  .st{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid;font-weight:600;white-space:nowrap}
  .st-bildirildi{color:var(--amber);border-color:var(--amber);background:rgba(251,191,36,.08)}
  .st-islemde{color:var(--cyan);border-color:var(--cyan);background:rgba(34,211,238,.08)}
  .st-cozuldu{color:var(--green);border-color:var(--green);background:rgba(52,211,153,.08)}
  .cact{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .empty{text-align:center;color:var(--txt-dim);font-size:13px;padding:24px;line-height:1.6}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .filters>div{flex:1;min-width:150px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .stat{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:13px 10px;text-align:center}
  .stat b{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;display:block}
  .stat span{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--txt-dim)}

  .view{display:none}.view.on{display:block}
  @media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}.card{grid-template-columns:70px 1fr}.card .thumb,.card .noimg{width:70px;height:70px}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">📸</div>
    <div>
      <h1 data-i18n="title">Atık İhbar</h1>
      <div class="sub" data-i18n="sub"></div>
    </div>
    <select class="lang-sel" id="langSel" onchange="setLang(this.value)">
      <option value="tr">TR</option><option value="en">EN</option>
    </select>
  </header>

  <div class="roles">
    <button id="rb-v" class="on" onclick="setRole('vatandas')" data-i18n="role_v"></button>
    <button id="rb-g" onclick="setRole('gorevli')" data-i18n="role_g"></button>
  </div>

  <section class="view on" id="view-vatandas">
    <div class="panel">
      <h2 data-i18n="newReport"></h2>
      <div class="ph" data-i18n="newReport_h"></div>
      <div class="ok-msg" id="okMsg"></div>

      <label class="fl" data-i18n="f_photo"></label>
      <div class="photo-box" id="photoBox">
        <div id="photoEmpty"><div class="pi">📷</div><div class="pt" data-i18n="photo_t"></div></div>
        <img id="photoPrev" style="display:none">
        <input type="file" accept="image/*" capture="environment" id="photoInput" onchange="onPhoto(this)">
      </div>

      <label class="fl" data-i18n="f_yer"></label>
      <input type="text" id="yer" data-i18n-ph="ph_yer">

      <label class="fl" data-i18n="f_konum"></label>
      <div class="geo">
        <button type="button" class="btn ghost sm" onclick="getLoc()" data-i18n="getLoc"></button>
        <span class="gv" id="geoVal">—</span>
      </div>

      <label class="fl" data-i18n="f_tur"></label>
      <select id="tur" onchange="autoBirim()"></select>

      <label class="fl" data-i18n="f_birim"></label>
      <select id="birim"></select>

      <label class="fl" data-i18n="f_aciklama"></label>
      <textarea id="aciklama" data-i18n-ph="ph_aciklama"></textarea>

      <button class="btn full" id="submitBtn" onclick="submitReport()" data-i18n="submit"></button>
    </div>

    <div class="panel">
      <h2 data-i18n="myReports"></h2>
      <div class="ph" data-i18n="myReports_h"></div>
      <div id="myList"></div>
    </div>
  </section>

  <section class="view" id="view-gorevli">
    <div class="panel">
      <h2 data-i18n="panelG"></h2>
      <div class="ph" data-i18n="panelG_h"></div>
      <div class="stats" id="stats"></div>
      <div class="filters">
        <div><label class="fl" data-i18n="f_birim_me"></label><select id="fBirim" onchange="renderDash()"></select></div>
        <div><label class="fl" data-i18n="f_durum"></label><select id="fDurum" onchange="renderDash()"></select></div>
      </div>
    </div>
    <div id="dashList"></div>
    <button class="btn ghost sm" style="margin-top:8px" onclick="seedDemo()" data-i18n="demo_seed"></button>
    <button class="btn ghost sm" style="margin-top:8px" onclick="clearAll()" data-i18n="clearAll"></button>
  </section>
</div>

<script>
const $=id=>document.getElementById(id);
const KEY="ihbar_v1";
const SB=window.supabase.createClient("https://xobvyvhmethgoparfjvm.supabase.co","sb_publishable_HKXI9gkBNQGUo6Ds_GO31g_tppPTDCo");
let DATA=[];
function mapRow(x){return {id:x.id,no:x.no,turKey:x.turkey,birimKey:x.birimkey,yer:x.yer,lat:x.lat,lng:x.lng,aciklama:x.aciklama,foto:x.foto,durum:x.durum,atanan:x.atanan,tarih:x.tarih};}
async function refresh(){
  try{const {data,error}=await SB.from("ihbarlar").select("*").order("tarih",{ascending:false});if(error)throw error;DATA=(data||[]).map(mapRow);}catch(e){}
  renderMy();renderDash();
}
let L=localStorage.getItem("ihbar_lang")||"tr";

const BIRIM=[
  {k:"temizlik",tr:"Belediye Temizlik İşleri",en:"Municipal Cleaning Dept."},
  {k:"cevre",tr:"Çevre Müdürlüğü",en:"Environmental Dept."},
  {k:"park",tr:"Park ve Bahçeler",en:"Parks & Gardens"},
  {k:"zabita",tr:"Zabıta",en:"Municipal Police"},
  {k:"su",tr:"Su ve Kanalizasyon",en:"Water & Sewerage"},
];
const TUR=[
  {k:"cop",tr:"Çöp birikintisi",en:"Litter / trash pile",b:"temizlik"},
  {k:"konteyner",tr:"Dolu / taşmış konteyner",en:"Full / overflowing bin",b:"temizlik"},
  {k:"moloz",tr:"Moloz / inşaat atığı",en:"Rubble / construction waste",b:"zabita"},
  {k:"tehlikeli",tr:"Tehlikeli atık (kimyasal, tıbbi, pil)",en:"Hazardous waste (chemical, medical, battery)",b:"cevre"},
  {k:"kacak",tr:"Kaçak döküm",en:"Illegal dumping",b:"zabita"},
  {k:"park",tr:"Park / bahçe atığı",en:"Park / garden waste",b:"park"},
  {k:"diger",tr:"Diğer",en:"Other",b:"temizlik"},
];
const T={
 tr:{title:"Atık İhbar",sub:"Gördüğün atığı bildir · ilgili birime ulaşsın",
   role_v:"👤 Vatandaş",role_g:"🛠 Görevli",
   newReport:"Yeni İhbar",newReport_h:"Sokakta veya herhangi bir yerde gördüğün atığı bildir. Fotoğraf çek, yeri yaz; ihbar ilgili birime düşer.",
   f_photo:"Fotoğraf",photo_t:"Fotoğraf çek veya seç",
   f_yer:"Yer / mekan ismi",ph_yer:"Örn: Atatürk Cad. 12 No önü, X Mahallesi",
   f_konum:"Konum (isteğe bağlı)",getLoc:"📍 Konumumu al",
   f_tur:"Atık türü",f_birim:"İlgili birim",
   f_aciklama:"Açıklama (isteğe bağlı)",ph_aciklama:"Kısa açıklama...",
   submit:"İhbarı Gönder",myReports:"İhbarlarım",myReports_h:"Gönderdiğin ihbarlar ve güncel durumları.",
   myEmpty:"Henüz ihbarın yok.<br>Yukarıdan ilk ihbarını gönder.",
   panelG:"Görevli Paneli",panelG_h:"İhbarlar buraya düşer. Birimine göre filtrele, işleme al ve çöz.",
   s_total:"Toplam",s_wait:"Bekliyor",s_prog:"İşlemde",s_done:"Çözüldü",
   f_birim_me:"Birim (ben)",f_durum:"Durum",all:"Tümü",
   dashEmpty:"Bu filtreye uyan ihbar yok.",clearAll:"Tüm ihbarları sil (demo)",demo_seed:"🎬 Demo verisi yükle",
   act_take:"İşleme Al",act_done:"Çözüldü",act_reopen:"Geri Aç",assign:"Kişiye ata",assigned:"Atanan: ",
   map:"🗺 Haritada gör",
   st_bildirildi:"Bildirildi",st_islemde:"İşlemde",st_cozuldu:"Çözüldü",
   msg_ok:"İhbarın alındı! Takip no: <b>{no}</b> · <b>{birim}</b> birimine iletildi.",
   msg_nophoto:"İhbar kaydedildi, ancak fotoğraf depolama sınırından dolayı eklenemedi.",
   err_yer:"Lütfen yer / mekan ismini yaz.",err_save:"Kaydedilemedi (depolama dolu olabilir).",
   geo_un:"Tarayıcı konumu desteklemiyor",geo_get:"alınıyor...",geo_fail:"konum alınamadı (izin gerekli)",
   assign_p:"Bu ihbar kime atansın? (görevli adı)",clear_c:"Tüm ihbarlar silinsin mi? (Bu sadece demo içindir)"},
 en:{title:"Waste Report",sub:"Report waste you see · reaches the right dept.",
   role_v:"👤 Citizen",role_g:"🛠 Official",
   newReport:"New Report",newReport_h:"Report waste you see on the street or anywhere. Take a photo, write the place; the report reaches the right department.",
   f_photo:"Photo",photo_t:"Take or choose a photo",
   f_yer:"Place / location name",ph_yer:"e.g. In front of 12 Main St., X District",
   f_konum:"Location (optional)",getLoc:"📍 Use my location",
   f_tur:"Waste type",f_birim:"Department",
   f_aciklama:"Note (optional)",ph_aciklama:"Short note...",
   submit:"Send Report",myReports:"My Reports",myReports_h:"Your reports and their current status.",
   myEmpty:"No reports yet.<br>Send your first report above.",
   panelG:"Official Panel",panelG_h:"Reports arrive here. Filter by your department, take action and resolve.",
   s_total:"Total",s_wait:"Pending",s_prog:"In progress",s_done:"Resolved",
   f_birim_me:"Department (me)",f_durum:"Status",all:"All",
   dashEmpty:"No reports match this filter.",clearAll:"Delete all reports (demo)",demo_seed:"🎬 Load demo data",
   act_take:"Take action",act_done:"Mark resolved",act_reopen:"Reopen",assign:"Assign to person",assigned:"Assigned: ",
   map:"🗺 View on map",
   st_bildirildi:"Reported",st_islemde:"In progress",st_cozuldu:"Resolved",
   msg_ok:"Report received! Tracking no: <b>{no}</b> · sent to <b>{birim}</b>.",
   msg_nophoto:"Report saved, but the photo couldn't be added due to storage limits.",
   err_yer:"Please enter the place / location name.",err_save:"Could not save (storage may be full).",
   geo_un:"Browser doesn't support location",geo_get:"getting...",geo_fail:"location unavailable (permission needed)",
   assign_p:"Assign this report to whom? (staff name)",clear_c:"Delete all reports? (Demo only)"}
};
const t=k=>T[L][k];
const birimName=k=>{const o=BIRIM.find(x=>x.k===k);return o?o[L]:k;};
const turName=k=>{const o=TUR.find(x=>x.k===k);return o?o[L]:k;};

let photoData=null, geo=null;

function load(){return DATA;}
function save(a){try{localStorage.setItem(KEY,JSON.stringify(a));return true}catch(e){return false}}

function setLang(l){L=l;localStorage.setItem("ihbar_lang",l);applyLang();}
function applyLang(){
  document.documentElement.lang=L;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const k=e.getAttribute('data-i18n');if(T[L][k]!=null)e.textContent=T[L][k];});
  document.querySelectorAll('[data-i18n-ph]').forEach(e=>{const k=e.getAttribute('data-i18n-ph');if(T[L][k]!=null)e.placeholder=T[L][k];});
  $("langSel").value=L;
  fillSelects();
  renderMy();renderDash();
}

function fillSelects(){
  const tv=$("tur").value,bv=$("birim").value,fbv=$("fBirim").value,fdv=$("fDurum").value;
  $("tur").innerHTML=TUR.map(o=>`<option value="${o.k}">${o[L]}</option>`).join("");
  $("birim").innerHTML=BIRIM.map(o=>`<option value="${o.k}">${o[L]}</option>`).join("");
  $("fBirim").innerHTML=`<option value="">${t("all")}</option>`+BIRIM.map(o=>`<option value="${o.k}">${o[L]}</option>`).join("");
  $("fDurum").innerHTML=`<option value="">${t("all")}</option>`+["bildirildi","islemde","cozuldu"].map(k=>`<option value="${k}">${t("st_"+k)}</option>`).join("");
  if(tv){$("tur").value=tv;} if(bv){$("birim").value=bv;}else{autoBirim();}
  $("fBirim").value=fbv;$("fDurum").value=fdv;
}
function autoBirim(){const o=TUR.find(x=>x.k===$("tur").value);$("birim").value=o?o.b:BIRIM[0].k;}

function setRole(r){
  $("view-vatandas").classList.toggle("on",r==="vatandas");
  $("view-gorevli").classList.toggle("on",r==="gorevli");
  $("rb-v").classList.toggle("on",r==="vatandas");
  $("rb-g").classList.toggle("on",r==="gorevli");
  refresh();
  window.scrollTo({top:0,behavior:"smooth"});
}

function onPhoto(input){
  const f=input.files&&input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{
    const max=800,sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement("canvas");c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    photoData=c.toDataURL("image/jpeg",0.7);
    $("photoPrev").src=photoData;$("photoPrev").style.display="block";$("photoEmpty").style.display="none";
  };img.src=e.target.result;};
  r.readAsDataURL(f);
}

function getLoc(){
  if(!navigator.geolocation){$("geoVal").textContent=t("geo_un");return;}
  $("geoVal").textContent=t("geo_get");
  navigator.geolocation.getCurrentPosition(
    p=>{geo={lat:p.coords.latitude,lng:p.coords.longitude};$("geoVal").innerHTML="📍 "+geo.lat.toFixed(5)+", "+geo.lng.toFixed(5);},
    ()=>{$("geoVal").textContent=t("geo_fail");});
}

async function submitReport(){
  const yer=$("yer").value.trim();
  if(!yer){alert(t("err_yer"));$("yer").focus();return;}
  const birim=$("birim").value;
  const no="İH-"+String(DATA.length+1).padStart(4,"0");
  const payload={no,turkey:$("tur").value,birimkey:birim,yer,
    lat:geo?geo.lat:null,lng:geo?geo.lng:null,aciklama:$("aciklama").value.trim(),
    foto:photoData,durum:"bildirildi",atanan:"",tarih:new Date().toISOString()};
  let res=await SB.from("ihbarlar").insert(payload);
  if(res.error&&photoData){payload.foto=null;res=await SB.from("ihbarlar").insert(payload);if(!res.error)flash(t("msg_nophoto"));}
  else if(!res.error){flash(t("msg_ok").replace("{no}",no).replace("{birim}",birimName(birim)));}
  if(res.error){alert(t("err_save"));return;}
  $("yer").value="";$("aciklama").value="";photoData=null;geo=null;
  $("photoPrev").style.display="none";$("photoEmpty").style.display="block";$("photoInput").value="";$("geoVal").textContent="—";
  await refresh();
}
function flash(msg){const m=$("okMsg");m.innerHTML="✓ "+msg;m.classList.add("show");m.scrollIntoView({behavior:"smooth",block:"center"});}

function fmtDate(iso){const d=new Date(iso),lc=L==="tr"?"tr-TR":"en-US";return d.toLocaleDateString(lc)+" "+d.toLocaleTimeString(lc,{hour:"2-digit",minute:"2-digit"});}
function mapLink(r){return r.lat!=null?`<a href="https://maps.google.com/?q=${r.lat},${r.lng}" target="_blank">${t("map")}</a>`:"";}

function card(r,official){
  const img=r.foto?`<img class="thumb" src="${r.foto}">`:`<div class="noimg">🗑</div>`;
  let act="";
  if(official){
    act='<div class="cact">';
    if(r.durum==="bildirildi")act+=`<button class="btn sm" onclick="setStatus(${r.id},'islemde')">${t("act_take")}</button>`;
    if(r.durum!=="cozuldu")act+=`<button class="btn sm" onclick="setStatus(${r.id},'cozuldu')">${t("act_done")}</button>`;
    if(r.durum==="cozuldu")act+=`<button class="btn ghost sm" onclick="setStatus(${r.id},'bildirildi')">${t("act_reopen")}</button>`;
    act+=`<button class="btn ghost sm" onclick="assign(${r.id})">${r.atanan?t("assigned")+r.atanan:t("assign")}</button></div>`;
  }
  return `<div class="card">${img}<div>
    <div class="ctop"><span class="cyer">${esc(r.yer)}</span><span class="st st-${r.durum}">${t("st_"+r.durum)}</span></div>
    <div class="cno">${r.no} · ${fmtDate(r.tarih)}</div>
    <div class="cmeta">${turName(r.turKey)} · ${birimName(r.birimKey)}${r.aciklama?" · "+esc(r.aciklama):""} ${mapLink(r)}${official&&r.atanan?" · 👤 "+esc(r.atanan):""}</div>
    ${act}</div></div>`;
}
function esc(s){return (s||"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}

function renderMy(){
  const list=load();
  $("myList").innerHTML=list.length?list.map(r=>card(r,false)).join(""):`<div class="empty">${t("myEmpty")}</div>`;
}
function renderDash(){
  const list=load();const c={t:list.length,b:0,i:0,c:0};
  list.forEach(r=>{if(r.durum==="bildirildi")c.b++;else if(r.durum==="islemde")c.i++;else c.c++;});
  $("stats").innerHTML=`
    <div class="stat"><b>${c.t}</b><span>${t("s_total")}</span></div>
    <div class="stat"><b style="color:var(--amber)">${c.b}</b><span>${t("s_wait")}</span></div>
    <div class="stat"><b style="color:var(--cyan)">${c.i}</b><span>${t("s_prog")}</span></div>
    <div class="stat"><b style="color:var(--green)">${c.c}</b><span>${t("s_done")}</span></div>`;
  const fb=$("fBirim").value,fd=$("fDurum").value;
  const f=list.filter(r=>(!fb||r.birimKey===fb)&&(!fd||r.durum===fd));
  $("dashList").innerHTML=f.length?f.map(r=>card(r,true)).join(""):`<div class="empty">${t("dashEmpty")}</div>`;
}
async function setStatus(id,s){await SB.from("ihbarlar").update({durum:s}).eq("id",id);await refresh();}
async function assign(id){const r=DATA.find(x=>x.id===id);if(!r)return;const n=prompt(t("assign_p"),r.atanan||"");if(n===null)return;const atanan=n.trim();const upd={atanan};if(r.durum==="bildirildi"&&atanan)upd.durum="islemde";await SB.from("ihbarlar").update(upd).eq("id",id);await refresh();}

async function clearAll(){if(confirm(t("clear_c"))){await SB.from("ihbarlar").delete().gt("id",0);await refresh();}}

applyLang();
refresh();
setInterval(function(){try{if($("view-gorevli").classList.contains("on"))refresh();}catch(e){}},12000);
